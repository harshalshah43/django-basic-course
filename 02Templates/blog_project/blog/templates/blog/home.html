{% extends 'blog\base.html' %}
{% block content %}
<h1>Home Page</h1>
{% for article in articles %}
<h3>{{article.title}}</h3>
<img src="{{article.image}}" width="250" height="250">
<h3>{{article.category}}</h3>
<h4>{{article.content}}</h4>
<h4>Created by - {{article.author}} Created At - {{article.created_at}}</h4>
{% endfor %}
{% endblock %}
